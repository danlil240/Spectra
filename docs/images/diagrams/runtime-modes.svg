<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 380" role="img" aria-label="Spectra runtime modes">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#38dcca"/>
    </marker>
    <style>
      .title { font: 700 28px Sora, sans-serif; fill: #0d1520; }
      .subtitle { font: 500 15px Sora, sans-serif; fill: #5c6f88; }
      .box { rx: 14; stroke-width: 2; }
      .label { font: 700 16px Sora, sans-serif; fill: #eef5ff; }
      .small { font: 500 13px Sora, sans-serif; fill: #c8d6ea; }
      .edge { stroke: #38dcca; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .branch { font: 600 13px 'JetBrains Mono', monospace; fill: #2d6a62; }
    </style>
  </defs>
  <rect width="1120" height="380" fill="url(#bg)"/>
  <text x="48" y="48" class="title">Runtime Mode Selection</text>
  <text x="48" y="78" class="subtitle">Selected at startup via env var or socket configuration</text>

  <rect class="box" x="430" y="118" width="260" height="64" fill="#0d1520" stroke="#38dcca"/>
  <text x="560" y="156" text-anchor="middle" class="label">Choose mode</text>

  <path class="edge" d="M430 182 Q 280 220 180 250"/>
  <path class="edge" d="M690 182 Q 840 220 940 250"/>
  <text x="300" y="210" class="branch">SPECTRA_RUNTIME_MODE=inproc</text>
  <text x="760" y="210" class="branch">default multiproc</text>

  <rect class="box" x="60" y="250" width="240" height="88" fill="#151f2c" stroke="#7bb7ff"/>
  <text x="180" y="288" text-anchor="middle" class="label">build/spectra</text>
  <text x="180" y="312" text-anchor="middle" class="small">single process · local Vulkan</text>

  <rect class="box" x="820" y="250" width="240" height="88" fill="#151f2c" stroke="#f7b267"/>
  <text x="940" y="288" text-anchor="middle" class="label">backend + agents</text>
  <text x="940" y="312" text-anchor="middle" class="small">IPC · TLV / FlatBuffers</text>
</svg>
