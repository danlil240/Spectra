name: "🐞 Bug Report"
description: Report a bug or regression in Spectra
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this 🙌
        Please fill out the details below so we can reproduce and fix it quickly.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A short and clear description of the issue
      placeholder: What is broken?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps to reproduce the issue
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - blocker
        - high
        - medium
        - low
    validations:
      required: true

  - type: input
    id: spectra_version
    attributes:
      label: Spectra version / commit
      placeholder: e.g. v0.3.1 or commit hash
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Ubuntu 22.04 / Windows 11 / macOS 14
    validations:
      required: true

  - type: input
    id: compiler
    attributes:
      label: Compiler + version
      placeholder: e.g. gcc 13.2 / clang 17 / MSVC 19.3x
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      description: Paste relevant logs, stack traces, or error output
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any extra context that may help
    validations:
      required: false
