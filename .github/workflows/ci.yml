name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ─── Build + Unit Tests (Linux) ─────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc-13
            cxx: g++-13
          - compiler: clang
            cc: clang-17
            cxx: clang++-17

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update
          sudo apt-get install -y \
            vulkan-tools \
            libvulkan-dev \
            vulkan-validationlayers \
            mesa-vulkan-drivers \
            libwayland-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            python3-pillow \
            glslang-tools

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DSPECTRA_BUILD_TESTS=ON \
            -DSPECTRA_BUILD_EXAMPLES=ON \
            -DSPECTRA_BUILD_GOLDEN_TESTS=ON \
            -DCMAKE_CXX_FLAGS="-Wall -Wextra -Werror"

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j$(nproc)

      - name: Pin Vulkan ICD to lavapipe
        run: |
          set -e
          ICD_DIRS=(/usr/share/vulkan/icd.d /etc/vulkan/icd.d /usr/lib/x86_64-linux-gnu/vulkan/icd.d)
          LVP_ICD=""
          for d in "${ICD_DIRS[@]}"; do
            [ -d "$d" ] || continue
            for f in "$d"/lvp_icd*.json "$d"/*lavapipe*.json; do
              [ -f "$f" ] || continue
              LVP_ICD="$f"; break 2
            done
          done
          if [ -z "$LVP_ICD" ]; then
            for d in "${ICD_DIRS[@]}"; do
              [ -d "$d" ] || continue
              F_MATCH="$(grep -l 'libvulkan_lvp\.so' "$d"/*.json 2>/dev/null | head -n1 || true)"
              if [ -n "$F_MATCH" ]; then LVP_ICD="$F_MATCH"; break; fi
            done
          fi
          if [ -n "$LVP_ICD" ]; then
            echo "VK_ICD_FILENAMES=$LVP_ICD" >> "$GITHUB_ENV"
            echo "VK_DRIVER_FILES=$LVP_ICD" >> "$GITHUB_ENV"
          else
            echo "::error::lavapipe ICD not found"; exit 1
          fi

      - name: Run unit tests (non-GPU)
        run: |
          cd build
          ctest --output-on-failure -LE "gpu|golden" -j$(nproc)

      - name: Run unit tests (GPU, serial)
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: |
          cd build
          ctest --output-on-failure -L "gpu" -LE "golden" -j1

  # ─── Build + Unit Tests (macOS) ─────────────────────────────────────────
  build-macos:
    strategy:
      matrix:
        include:
          - os: macos-15     # ARM (M-series)
            arch: arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          brew install vulkan-headers vulkan-loader glslang molten-vk
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install Pillow
          python -c "from PIL import Image; print(f'Pillow {Image.__version__} installed')"
          echo "PYTHON_VENV=$PWD/.venv/bin/python" >> "$GITHUB_ENV"

      - name: Configure CMake
        run: |
          source .venv/bin/activate
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DPython3_EXECUTABLE:FILEPATH="$PYTHON_VENV" \
            -DSPECTRA_BUILD_TESTS=ON \
            -DSPECTRA_BUILD_EXAMPLES=ON \
            -DSPECTRA_BUILD_GOLDEN_TESTS=OFF

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j$(sysctl -n hw.ncpu)

      - name: Run unit tests
        run: |
          cd build
          ctest --output-on-failure -LE gpu -j$(sysctl -n hw.ncpu)

  # ─── Build + Unit Tests (Windows) ───────────────────────────────────────
  build-windows:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $ver = "1.4.304.1"
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe"
          Invoke-WebRequest -Uri $url -OutFile VulkanSDK.exe
          Start-Process -FilePath .\VulkanSDK.exe -Args "--accept-licenses --default-answer --confirm-command install" -Wait
          $sdkPath = "C:\VulkanSDK\$ver"
          echo "VULKAN_SDK=$sdkPath" >> $env:GITHUB_ENV
          echo "$sdkPath\Bin" >> $env:GITHUB_PATH

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          $pythonExe = Join-Path $PWD ".venv\Scripts\python.exe"
          & $pythonExe -m pip install --upgrade pip
          & $pythonExe -m pip install Pillow
          & $pythonExe -c "from PIL import Image; print(f'Pillow {Image.__version__} installed')"
          "PYTHON_VENV=$pythonExe" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure CMake
        shell: pwsh
        run: |
          $pythonExe = (Resolve-Path "${env:PYTHON_VENV}").Path
          cmake -B build `
            "-DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}" `
            "-DPython3_EXECUTABLE:FILEPATH=$pythonExe" `
            "-DSPECTRA_BUILD_TESTS=ON" `
            "-DSPECTRA_BUILD_EXAMPLES=ON" `
            "-DSPECTRA_BUILD_GOLDEN_TESTS=OFF"

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j $env:NUMBER_OF_PROCESSORS

      - name: Run unit tests
        run: |
          cd build
          ctest --output-on-failure -LE gpu -C ${{ env.BUILD_TYPE }} -j $env:NUMBER_OF_PROCESSORS

  # ─── Golden Image Tests (lavapipe software Vulkan) ───────────────────────
  golden-tests:
    runs-on: ubuntu-24.04
    needs: build-linux

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies + lavapipe
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update
          sudo apt-get install -y \
            vulkan-tools \
            libvulkan-dev \
            vulkan-validationlayers \
            mesa-vulkan-drivers \
            mesa-utils \
            libwayland-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            python3-pillow \
            xvfb \
            glslang-tools

      - name: Verify lavapipe
        run: |
          echo "Available Vulkan ICDs:"
          ls /usr/share/vulkan/icd.d/ 2>/dev/null || true
          find /usr -name '*lvp*' -o -name '*lavapipe*' 2>/dev/null || true
          vulkaninfo --summary || echo "vulkaninfo not available, continuing..."

      - name: Pin Vulkan ICD to lavapipe
        run: |
          set -e
          ICD_DIRS=(
            /usr/share/vulkan/icd.d
            /etc/vulkan/icd.d
            /usr/lib/x86_64-linux-gnu/vulkan/icd.d
            /usr/lib/i386-linux-gnu/vulkan/icd.d
          )

          LVP_ICD=""
          for d in "${ICD_DIRS[@]}"; do
            [ -d "$d" ] || continue
            for f in "$d"/lvp_icd*.json "$d"/*lavapipe*.json; do
              [ -f "$f" ] || continue
              LVP_ICD="$f"
              break 2
            done
          done

          # Fallback: detect lavapipe ICD by JSON content if filename changed.
          if [ -z "$LVP_ICD" ]; then
            for d in "${ICD_DIRS[@]}"; do
              [ -d "$d" ] || continue
              F_MATCH="$(grep -l 'libvulkan_lvp\.so' "$d"/*.json 2>/dev/null | head -n1 || true)"
              if [ -n "$F_MATCH" ]; then
                LVP_ICD="$F_MATCH"
                break
              fi
            done
          fi

          if [ -n "$LVP_ICD" ]; then
            echo "Using lavapipe ICD: $LVP_ICD"
            echo "VK_ICD_FILENAMES=$LVP_ICD" >> "$GITHUB_ENV"
            # Newer Vulkan loader env var name; keep both for compatibility.
            echo "VK_DRIVER_FILES=$LVP_ICD" >> "$GITHUB_ENV"
          else
            echo "::error::lavapipe ICD not found"
            exit 1
          fi

      - name: Configure + Build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DSPECTRA_BUILD_TESTS=ON \
            -DSPECTRA_BUILD_GOLDEN_TESTS=ON \
            -DSPECTRA_BUILD_EXAMPLES=OFF
          cmake --build build --config ${{ env.BUILD_TYPE }} -j$(nproc)

      - name: Run golden image tests
        env:
          SPECTRA_UPDATE_BASELINES: "0"
          SPECTRA_GOLDEN_BASELINE_DIR: ${{ github.workspace }}/tests/golden/baseline
          SPECTRA_GOLDEN_OUTPUT_DIR: ${{ github.workspace }}/tests/golden/output
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: |
          rm -rf tests/golden/output
          mkdir -p tests/golden/output
          cd build
          xvfb-run -a ctest --output-on-failure -L golden -j1 --repeat until-pass:2

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-test-output
          path: tests/golden/output/
          retention-days: 14

  # ─── Sanitizers (ASan + UBSan) ──────────────────────────────────────────
  sanitizers:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        sanitizer: [address, undefined]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update
          sudo apt-get install -y \
            vulkan-tools \
            libvulkan-dev \
            vulkan-validationlayers \
            mesa-vulkan-drivers \
            libwayland-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            glslang-tools \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            python3-pillow

      - name: Configure with sanitizer
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=${{ matrix.sanitizer }} -fno-omit-frame-pointer -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=${{ matrix.sanitizer }}" \
            -DSPECTRA_BUILD_TESTS=ON \
            -DSPECTRA_BUILD_GOLDEN_TESTS=OFF \
            -DSPECTRA_BUILD_EXAMPLES=OFF \
            -DSPECTRA_USE_ROS2=OFF

      - name: Build
        run: cmake --build build --config Debug -j$(nproc)

      - name: Run tests under sanitizer
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          cd build
          ctest --output-on-failure -LE gpu -j$(nproc)

  # ─── ROS2 Adapter Build (compile-only) ─────────────────────────────────────
  build-ros2:
    runs-on: ubuntu-24.04
    container:
      image: ros:humble-ros-base

    steps:
      - uses: actions/checkout@v4

      - name: Install ROS2 dependencies
        run: |
          apt-get update
          apt-get install -y software-properties-common
          add-apt-repository -y ppa:ubuntu-toolchain-r/test
          apt-get update
          apt-get install -y \
            gcc-13 \
            g++-13 \
            libvulkan-dev \
            libglfw3-dev \
            glslang-tools \
            nlohmann-json3-dev \
            libtinyxml2-dev \
            python3-pillow \
            xvfb \
            mesa-vulkan-drivers \
            vulkan-tools

      - name: Pin Vulkan ICD to lavapipe
        shell: bash
        run: |
          set -e
          ICD_DIRS=(
            /usr/share/vulkan/icd.d
            /etc/vulkan/icd.d
            /usr/lib/x86_64-linux-gnu/vulkan/icd.d
          )
          LVP_ICD=""
          for d in "${ICD_DIRS[@]}"; do
            [ -d "$d" ] || continue
            for f in "$d"/lvp_icd*.json "$d"/*lavapipe*.json; do
              [ -f "$f" ] || continue
              LVP_ICD="$f"
              break 2
            done
          done
          if [ -z "$LVP_ICD" ]; then
            F_MATCH="$(grep -rl 'libvulkan_lvp\.so' /usr/share/vulkan/icd.d 2>/dev/null | head -n1 || true)"
            [ -n "$F_MATCH" ] && LVP_ICD="$F_MATCH"
          fi
          if [ -n "$LVP_ICD" ]; then
            echo "Using lavapipe ICD: $LVP_ICD"
            echo "VK_ICD_FILENAMES=$LVP_ICD" >> "$GITHUB_ENV"
            echo "VK_DRIVER_FILES=$LVP_ICD" >> "$GITHUB_ENV"
          else
            echo "::error::lavapipe ICD not found"
            exit 1
          fi

      - name: Configure CMake with ROS2
        run: |
          . /opt/ros/humble/setup.sh
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DSPECTRA_USE_ROS2=ON \
            -DSPECTRA_ROS2_BAG=ON \
            -DSPECTRA_BUILD_TESTS=ON \
            -DSPECTRA_BUILD_QA_AGENT=ON \
            -DSPECTRA_BUILD_BENCHMARKS=ON \
            -DSPECTRA_BUILD_EXAMPLES=OFF \
            -DSPECTRA_BUILD_GOLDEN_TESTS=OFF

      - name: Build ROS2 adapter
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j$(nproc)

      - name: Run ROS2 unit tests
        run: |
          . /opt/ros/humble/setup.sh
          # Serial: ROS2 test binaries share one DDS domain; parallel ctest races discovery.
          ctest --test-dir build -L ros2 -LE gpu --output-on-failure -j1

      - name: Headless bag CSV export (Phase B9)
        run: |
          . /opt/ros/humble/setup.sh
          python3 scripts/generate_ros_reference_bags.py
          ./build/spectra-ros-analyze \
            --bag tests/data/ros_bags/imu_snippet \
            --fields /imu/data.linear_acceleration.z \
            --csv /tmp/imu_z.csv
          test "$(wc -l < /tmp/imu_z.csv)" -eq 61

      - name: ROS 3D perf smoke (Phase C4)
        run: |
          . /opt/ros/humble/setup.sh
          ./build/tests/bench_ros3d \
            --benchmark_filter='BM_PointCloud(Display|Adapter).*500000' \
            --benchmark_min_time=0.05

      - name: ROS QA nav spatiotemporal (Phase C7)
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          ROS_LOG_DIR: /tmp/ros_logs
          ROS_HOME: /tmp/spectra_ros_home
        run: |
          . /opt/ros/humble/setup.sh
          mkdir -p "$ROS_LOG_DIR" "$ROS_HOME"
          export XDG_RUNTIME_DIR="/tmp/runtime-ros-qa-nav"
          mkdir -p "$XDG_RUNTIME_DIR"
          python3 scripts/generate_ros_reference_bags.py
          xvfb-run -a ./build/tests/spectra_ros_qa_agent \
            --scenario nav_spatiotemporal \
            --seed 42 \
            --duration 90 \
            --output-dir /tmp/spectra_ros_qa_nav

      - name: ROS QA first_plot benchmark (Phase A C1)
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          ROS_LOG_DIR: /tmp/ros_logs
          ROS_HOME: /tmp/spectra_ros_home
        run: |
          . /opt/ros/humble/setup.sh
          mkdir -p "$ROS_LOG_DIR" "$ROS_HOME"
          export XDG_RUNTIME_DIR="/tmp/runtime-ros-qa-first-plot"
          mkdir -p "$XDG_RUNTIME_DIR"
          xvfb-run -a ./build/tests/spectra_ros_qa_agent \
            --scenario first_plot \
            --seed 42 \
            --duration 60 \
            --output-dir /tmp/spectra_ros_qa_first_plot

      - name: ROS QA design review (spectra-ros)
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          ROS_LOG_DIR: /tmp/ros_logs
          ROS_HOME: /tmp/spectra_ros_home
        run: |
          . /opt/ros/humble/setup.sh
          mkdir -p "$ROS_LOG_DIR" "$ROS_HOME"
          export XDG_RUNTIME_DIR="/tmp/runtime-ros-qa"
          mkdir -p "$XDG_RUNTIME_DIR"
          xvfb-run -a ./build/tests/spectra_ros_qa_agent \
            --design-review \
            --scenario design_review \
            --seed 42 \
            --duration 120 \
            --output-dir /tmp/spectra_ros_qa_ci

      - name: Upload ROS QA artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ros-qa-design-review
          path: /tmp/spectra_ros_qa_ci/
          retention-days: 7
