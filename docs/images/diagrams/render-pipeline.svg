<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 420" role="img" aria-label="Spectra Vulkan render pipeline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#38dcca"/>
    </marker>
    <style>
      .title { font: 700 28px 'Sora', system-ui, sans-serif; fill: #0d1520; }
      .subtitle { font: 500 15px 'Sora', system-ui, sans-serif; fill: #5c6f88; }
      .box { rx: 14; stroke-width: 2; }
      .label { font: 700 16px 'Sora', system-ui, sans-serif; fill: #eef5ff; }
      .edge { stroke: #38dcca; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .edge-muted { stroke: #7bb7ff; stroke-width: 2.5; stroke-dasharray: 8 6; fill: none; }
    </style>
  </defs>
  <rect width="1120" height="420" fill="url(#bg)"/>
  <text x="48" y="52" class="title">Render Pipeline</text>
  <text x="48" y="82" class="subtitle">Figure state changes become GPU draw calls on the render thread</text>

  <rect class="box" x="48" y="150" width="190" height="88" fill="#151f2c" stroke="#7bb7ff"/>
  <text x="143" y="188" text-anchor="middle" class="label">Figure / Axes</text>
  <text x="143" y="212" text-anchor="middle" style="font:500 13px Sora,sans-serif;fill:#c8d6ea">Series state</text>

  <path class="edge" d="M238 194 H288"/>
  <rect class="box" x="288" y="150" width="170" height="88" fill="#101923" stroke="#38dcca"/>
  <text x="373" y="200" text-anchor="middle" class="label">Renderer</text>

  <path class="edge" d="M458 194 H508"/>
  <rect class="box" x="508" y="150" width="200" height="88" fill="#0d1520" stroke="#38dcca"/>
  <text x="608" y="188" text-anchor="middle" class="label">VulkanBackend</text>
  <text x="608" y="212" text-anchor="middle" style="font:500 13px Sora,sans-serif;fill:#c8d6ea">swapchain pass</text>

  <path class="edge" d="M708 194 H758"/>
  <rect class="box" x="758" y="150" width="160" height="88" fill="#151f2c" stroke="#f7b267"/>
  <text x="838" y="200" text-anchor="middle" class="label">Vulkan GPU</text>

  <rect class="box" x="948" y="132" width="124" height="64" fill="#101923" stroke="#7bb7ff"/>
  <text x="1010" y="170" text-anchor="middle" class="label" style="font-size:14px">SPIR-V</text>

  <path class="edge-muted" d="M1010 196 V250 H608 H458"/>
  <rect class="box" x="288" y="286" width="190" height="72" fill="#101923" stroke="#7bb7ff"/>
  <text x="383" y="328" text-anchor="middle" class="label">RenderUpload</text>

  <rect class="box" x="508" y="286" width="200" height="72" fill="#101923" stroke="#7bb7ff"/>
  <text x="608" y="328" text-anchor="middle" class="label">ImGuiIntegration</text>

  <path class="edge-muted" d="M383 286 V250"/>
  <path class="edge-muted" d="M608 286 V238"/>
</svg>
