name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

env:
  BUILD_TYPE: Release
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ─── Linux Packages (.deb, .tar.gz) ────────────────────────────────────
  package-linux:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            label: ubuntu22.04
            docker_tag: "22.04"
            codename: jammy
          - os: ubuntu-24.04
            label: ubuntu24.04
            docker_tag: "24.04"
            codename: noble
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev \
            vulkan-validationlayers \
            libwayland-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            glslang-tools \
            ffmpeg \
            rpm

      - name: Configure + Build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DSPECTRA_BUILD_TESTS=OFF \
            -DSPECTRA_BUILD_EXAMPLES=OFF \
            -DSPECTRA_PKG_DISTRO_CODENAME=${{ matrix.codename }}
          cmake --build build --config ${{ env.BUILD_TYPE }} -j$(nproc)

      - name: Package
        run: |
          cd build
          cpack -G TGZ
          cpack -G DEB
          cpack -G RPM || true

      - name: Inspect DEB metadata
        run: |
          for f in build/*.deb; do
            echo "==== $f ===="
            dpkg-deb -I "$f" | sed -n '1,120p'
          done

      - name: Smoke-test DEB install (clean container)
        run: |
          # Build a throwaway container from a clean base image to verify
          # the .deb installs without any pre-existing build dependencies.
          cat > /tmp/Dockerfile.deb-test <<'DOCKEOF'
          FROM ubuntu:${{ matrix.docker_tag }}
          COPY *.deb /tmp/
          RUN apt-get update \
              && apt-get install -y --no-install-recommends /tmp/*.deb \
              && rm -rf /var/lib/apt/lists/*
          RUN spectra --version
          RUN spectra-backend --version
          RUN ! ldd "$(command -v spectra)" | grep -q "not found"
          RUN ! ldd "$(command -v spectra-backend)" | grep -q "not found"
          DOCKEOF
          docker build -f /tmp/Dockerfile.deb-test -t spectra-deb-smoke build/

      - name: Build AppImage
        run: |
          curl -fsSL -o linuxdeploy-x86_64.AppImage \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage
          test -f "${GITHUB_WORKSPACE}/packaging/AppImage/build-appimage.sh"
          bash "${GITHUB_WORKSPACE}/packaging/AppImage/build-appimage.sh" build

      - name: Normalize Linux artifact names
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          mkdir -p artifacts
          for f in build/*.deb; do
            ARCH=$(dpkg-deb -f "$f" Architecture)
            cp "$f" "artifacts/spectra_${VERSION}_${ARCH}_${{ matrix.label }}.deb"
          done
          for f in build/*.tar.gz; do
            b="$(basename "$f" .tar.gz)"
            cp "$f" "artifacts/${b}_${{ matrix.label }}.tar.gz"
          done
          for f in build/*.rpm; do
            [ -f "$f" ] || continue
            b="$(basename "$f" .rpm)"
            cp "$f" "artifacts/${b}_${{ matrix.label }}.rpm"
          done
          for f in build/*.AppImage; do
            b="$(basename "$f" .AppImage)"
            cp "$f" "artifacts/${b}_${{ matrix.label }}.AppImage"
          done
          ls -la artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-${{ matrix.label }}
          path: artifacts/*

  # ─── macOS Package (.tar.gz) ────────────────────────────────────────────
  package-macos:
    strategy:
      matrix:
        include:
          - os: macos-15
            arch: arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install vulkan-headers vulkan-loader glslang molten-vk

      - name: Configure + Build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DSPECTRA_BUILD_TESTS=OFF \
            -DSPECTRA_BUILD_EXAMPLES=OFF
          cmake --build build --config ${{ env.BUILD_TYPE }} -j$(sysctl -n hw.ncpu)

      - name: Package
        run: |
          cd build
          cpack -G TGZ

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.os }}-${{ matrix.arch }}-packages
          path: build/*.tar.gz

  # ─── Windows Package (.zip) ─────────────────────────────────────────────
  package-windows:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $ver = "1.4.304.1"
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe"
          Invoke-WebRequest -Uri $url -OutFile VulkanSDK.exe
          Start-Process -FilePath .\VulkanSDK.exe -Args "--accept-licenses --default-answer --confirm-command install" -Wait
          $sdkPath = "C:\VulkanSDK\$ver"
          echo "VULKAN_SDK=$sdkPath" >> $env:GITHUB_ENV
          echo "$sdkPath\Bin" >> $env:GITHUB_PATH

      - name: Configure + Build
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DSPECTRA_BUILD_TESTS=OFF `
            -DSPECTRA_BUILD_EXAMPLES=OFF
          cmake --build build --config ${{ env.BUILD_TYPE }} -j $env:NUMBER_OF_PROCESSORS

      - name: Package
        run: |
          cd build
          cpack -G ZIP

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: build/*.zip

  # ─── Python Wheels (cibuildwheel) ───────────────────────────────────────
  python-wheels:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15-intel, macos-15, windows-2022]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Vulkan SDK (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev \
            vulkan-validationlayers \
            libwayland-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            glslang-tools

      - name: Install Vulkan SDK (macOS)
        if: runner.os == 'macOS'
        run: brew install vulkan-headers vulkan-loader glslang molten-vk

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "1.4.304.1"
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe"
          Invoke-WebRequest -Uri $url -OutFile VulkanSDK.exe
          Start-Process -FilePath .\VulkanSDK.exe -Args "--accept-licenses --default-answer --confirm-command install" -Wait
          $sdkPath = "C:\VulkanSDK\$ver"
          echo "VULKAN_SDK=$sdkPath" >> $env:GITHUB_ENV
          echo "$sdkPath\Bin" >> $env:GITHUB_PATH

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.21.3

      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_LINUX: x86_64
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_* *-manylinux_i686 *-win32 pp*"
          CIBW_BUILD_VERBOSITY: 1
          # manylinux_2_34 is currently emitting x86_64_v2 ISA notes for our wheel.
          # Use manylinux_2_28 for a stable x86_64 baseline auditwheel target.
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_ENVIRONMENT_LINUX: >
            CFLAGS="-march=x86-64 -mtune=generic"
            CXXFLAGS="-march=x86-64 -mtune=generic"
            CMAKE_ARGS="-DCMAKE_C_FLAGS=-march=x86-64 -DCMAKE_CXX_FLAGS=-march=x86-64"
          CIBW_BEFORE_ALL_LINUX: >
            dnf -y install git cmake ninja-build &&
            git clone https://github.com/KhronosGroup/glslang.git --depth 1 --branch 14.2.0 &&
            cd glslang && 
            mkdir build && cd build && 
            cmake -GNinja -DCMAKE_BUILD_TYPE=Release -DENABLE_OPT=0 .. && 
            ninja && 
            cp StandAlone/glslang /usr/local/bin/glslangValidator && 
            cd / && 
            rm -rf /glslang && 
            dnf -y install
            vulkan-loader-devel
            vulkan-headers
            mesa-libGL-devel
            libXrandr-devel
            libXinerama-devel
            libXcursor-devel
            libXi-devel
            libxkbcommon-devel
            wayland-devel
          CIBW_ENVIRONMENT_MACOS: >
            MACOSX_DEPLOYMENT_TARGET=15.0
            CFLAGS="-mmacosx-version-min=15.0"
            CXXFLAGS="-mmacosx-version-min=15.0"
            CMAKE_ARGS="-DCMAKE_OSX_DEPLOYMENT_TARGET=15.0"
          CIBW_BUILD_MACOS: cp39-* cp310-* cp311-* cp312-* cp313-*
          CIBW_REPAIR_MACOS: delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel} --macos-version 15.0
          CIBW_ENVIRONMENT_MACOS_ARM64: >
            MACOSX_DEPLOYMENT_TARGET=15.0
            CFLAGS="-mmacosx-version-min=15.0"
            CXXFLAGS="-mmacosx-version-min=15.0"
            CMAKE_ARGS="-DCMAKE_OSX_DEPLOYMENT_TARGET=15.0"
          CIBW_REPAIR_MACOS_ARM64: delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel} --macos-version 15.0

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  # ─── Python sdist ──────────────────────────────────────────────────────
  python-sdist:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist
        run: |
          pip install build
          cp version.txt python/VERSION
          python -m build --sdist python/ --output dist/

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ─── Create GitHub Release ─────────────────────────────────────────────
  release:
    needs: [package-linux, package-macos, package-windows, python-wheels, python-sdist]
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: find dist/ -type f | sort

      - name: Read version
        id: version
        run: echo "version=$(cat version.txt | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Check GPG key availability
        id: gpg_check
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::GPG_PRIVATE_KEY secret not set — skipping artifact signing"
          fi

      - name: Import GPG key
        if: steps.gpg_check.outputs.available == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> $GITHUB_ENV
          GPG_FINGERPRINT=$(gpg --list-secret-keys --with-colons | grep fpr | head -1 | cut -d':' -f10)
          echo "$GPG_FINGERPRINT:6:" | gpg --import-ownertrust

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: GPG-sign checksums and artifacts
        if: steps.gpg_check.outputs.available == 'true'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cd dist
          # Sign the checksums file
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --detach-sign --armor SHA256SUMS
          # Sign each binary artifact
          for f in *; do
            [ "$f" = "SHA256SUMS" ] && continue
            [ "$f" = "SHA256SUMS.asc" ] && continue
            gpg --batch --yes --pinentry-mode loopback \
              --passphrase "$GPG_PASSPHRASE" \
              --detach-sign --armor "$f"
          done
          echo "--- Signed artifacts ---"
          ls -la *.asc

      - name: Export GPG public key
        if: steps.gpg_check.outputs.available == 'true'
        run: |
          gpg --armor --export "$GPG_KEY_ID" > dist/spectra-release-signing-key.asc

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Spectra v${{ steps.version.outputs.version }}
          body: |
            ## Spectra v${{ steps.version.outputs.version }}

            ### Installation

            **Python (all platforms):**
            ```
            pip install spectra-plot
            ```

            **Linux (.deb):**
            ```
            sudo apt update
            sudo apt install -y ./spectra_${{ steps.version.outputs.version }}_amd64_ubuntu22.04.deb
            # or:
            sudo apt install -y ./spectra_${{ steps.version.outputs.version }}_amd64_ubuntu24.04.deb
            ```

            **From source:**
            ```
            cmake -B build && cmake --build build && sudo cmake --install build
            ```

            ### Verifying Downloads

            All release artifacts are GPG-signed. To verify:

            **1. Import the signing key:**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/spectra-release-signing-key.asc | gpg --import
            ```

            **2. Verify checksums file:**
            ```bash
            gpg --verify SHA256SUMS.asc SHA256SUMS
            ```

            **3. Verify file integrity:**
            ```bash
            sha256sum -c SHA256SUMS --ignore-missing
            ```

            **4. Or verify an individual artifact:**
            ```bash
            gpg --verify spectra_${{ steps.version.outputs.version }}_amd64_ubuntu24.04.deb.asc \
                         spectra_${{ steps.version.outputs.version }}_amd64_ubuntu24.04.deb
            ```
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}

  # ─── Publish to PyPI (Trusted Publishing / OIDC) ─────────────────────────
  publish-pypi:
    needs: [release]
    runs-on: ubuntu-24.04
    if: "!contains(github.ref, 'alpha') && !contains(github.ref, 'beta')"
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  # ─── APT Repository (GitHub Pages) ────────────────────────────────────────
  apt-repo:
    needs: [release]
    runs-on: ubuntu-24.04
    if: "!contains(github.ref, 'alpha') && !contains(github.ref, 'rc')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          path: debs/
          pattern: linux-packages-*
          merge-multiple: true

      - name: Check GPG key availability
        id: gpg_check
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::error::GPG_PRIVATE_KEY secret is required for APT repo signing"
            exit 1
          fi

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> $GITHUB_ENV
          GPG_FINGERPRINT=$(gpg --list-secret-keys --with-colons | grep fpr | head -1 | cut -d':' -f10)
          echo "$GPG_FINGERPRINT:6:" | gpg --import-ownertrust

      - name: Install reprepro
        run: sudo apt-get install -y reprepro

      - name: Checkout gh-pages branch
        run: |
          git fetch origin gh-pages || true
          if git show-ref --quiet refs/remotes/origin/gh-pages; then
            git worktree add gh-pages-tree origin/gh-pages
          else
            # First time: create orphan gh-pages branch
            git worktree add --orphan -b gh-pages gh-pages-tree
          fi

      - name: Set up APT repo structure
        run: |
          # Clear old reprepro database (codenames may have changed)
          rm -rf gh-pages-tree/apt/db gh-pages-tree/apt/dists gh-pages-tree/apt/pool
          mkdir -p gh-pages-tree/apt/conf
          # Copy reprepro config (update SignWith to use our key)
          sed "s/SignWith: yes/SignWith: $GPG_KEY_ID/" \
            packaging/apt/distributions > gh-pages-tree/apt/conf/distributions
          cp packaging/apt/options gh-pages-tree/apt/conf/options

      - name: Add packages to APT repo
        run: |
          cd gh-pages-tree/apt
          for deb in ../../debs/*.deb; do
            # Route to correct distribution based on Ubuntu version in filename
            if [[ "$deb" == *ubuntu22.04* ]]; then
              codename="jammy"
            elif [[ "$deb" == *ubuntu24.04* ]]; then
              codename="noble"
            else
              echo "WARNING: Unknown distro for $deb, skipping"
              continue
            fi
            echo "Adding $deb to $codename"
            reprepro -Vb . --confdir ./conf includedeb "$codename" "$deb"
          done

          # Export public key so apt clients can verify the repo
          gpg --armor --export "$GPG_KEY_ID" > spectra-archive-keyring.asc

      - name: Copy apt README
        run: cp packaging/apt/README.md gh-pages-tree/apt/README.md

      - name: Commit and push gh-pages
        run: |
          cd gh-pages-tree
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "apt: add packages for ${{ github.ref_name }}"
          git push origin HEAD:gh-pages
